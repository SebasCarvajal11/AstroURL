name: Keep Cima CRM Awake

on:
  schedule:
    # Lunes a Viernes: 8:00 AM - 4:59 PM (Hora Colombia)
    - cron: '*/8 13-21 * * 1-5'
  
  workflow_dispatch:

jobs:
  ping-cima:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CIMA CRM Backend
        run: curl -f -I -m 10 https://cima-crm-backend.onrender.com/ping
