name: Keep Cima CRM Awake

on:
  schedule:
    # Lun a Vie: 8:00 AM a 4:59 PM (Hora Col) -> 13:00-21:59 UTC
    # Totalmente optimizado para reclutadores
    - cron: '*/14 13-21 * * 1-5'
  
  workflow_dispatch:

jobs:
  ping-cima:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CIMA CRM Backend
        run: curl -s https://cima-crm-backend.onrender.com/ping
