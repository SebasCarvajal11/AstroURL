name: Keep AstroURL Awake

on:
  schedule:
    # Lunes a Viernes: 8:00 AM - 6:59 PM (Hora Colombia)
    - cron: '*/8 13-23 * * 1-5'
    # Lunes a Viernes: 7:00 PM - 8:00 PM (Hora Colombia)
    - cron: '*/8 0 * * 2-6'
    # Sábados: 8:00 AM - 3:59 PM (Hora Colombia)
    - cron: '*/8 13-20 * * 6'
  
  workflow_dispatch:

jobs:
  ping-astro:
    runs-on: ubuntu-latest
    steps:
      - name: Ping AstroURL
        run: curl -f -I -m 10 https://astrourls.onrender.com/ping
